<div class="p-2">

  <!-- CABECERA -->
  <p-card styleClass="sedes-header-card mb-4 ventas-header-bordered">
    <div class="flex align-items-center justify-content-between flex-wrap gap-2">
      <div class="flex align-items-center gap-3">
        <span class="sedes-title-icon"><i class="pi pi-tag"></i></span>
        <div>
          <p class="sedes-kicker">ADMINISTRADOR - ADMINISTRACIÓN - CATEGORÍAS</p>
          <h2 class="sedes-title">GESTIÓN DE CATEGORÍAS</h2>
        </div>
      </div>
      <div class="flex justify-items-end gap-2">
        <!-- Botón "Agregar Categoría" — solo si tiene CREAR_CATEGORIAS -->
        <p-button
          *ngIf="puedeCrearCategoria"
          label="Agregar Categoría"
          icon="pi pi-plus"
          styleClass="sedes-pill"
          [routerLink]="['/admin/categoria/agregar-categoria']">
        </p-button>
      </div>
    </div>
  </p-card>

  <!-- FILTROS -->
  <div class="filtros-container mb-4">
    <div class="seccion-filtros">
      <h3><i class="pi pi-filter"></i> Filtros de búsqueda</h3>

      <div class="filtros-linea-1">
        <div class="filtro-item filtro-cliente-50">
          <label>Buscar Categoría</label>
          <p-autoComplete
            styleClass="w-full"
            [ngModel]="searchTerm()"
            (ngModelChange)="onSearchChange($event)"
            [suggestions]="categoriaSuggestions()"
            field="nombre"
            (completeMethod)="onSearch($event)"
            (onSelect)="onSelectCategoria($event)"
            placeholder="Escribe nombre o descripción...">
            <ng-template let-item pTemplate="item">
              <div class="flex flex-column gap-1">
                <span class="font-medium">{{ item.nombre }}</span>
                <small class="text-500">{{ item.descripcion }}</small>
              </div>
            </ng-template>
          </p-autoComplete>
        </div>
      </div>

      <div class="filtros-linea-2">
        <div class="filtro-item filtro-compacto">
          <label>Vista</label>
          <p-select
            [options]="viewOptions"
            optionLabel="label"
            optionValue="value"
            [ngModel]="viewMode()"
            (ngModelChange)="onViewModeChange($event)"
            placeholder="Todos"
            styleClass="w-full">
          </p-select>
        </div>

        <div class="filtro-item filtro-boton-limpiar">
          <label>&nbsp;</label>
          <p-button
            label="Limpiar Filtros"
            icon="pi pi-filter-slash"
            severity="danger"
            styleClass="btn-limpiar-filtros"
            type="button"
            (click)="clearSearch()">
          </p-button>
        </div>
      </div>
    </div>
  </div>

  <p-toast position="top-right" />

  <!-- ERROR -->
  <p-message
    *ngIf="!loading() && error() as e"
    severity="error" [text]="e"
    class="mb-3 block">
  </p-message>

  <!-- TABLA -->
  <app-shared-table-container
    titulo="Listado de Categorías"
    iconoTitulo="pi pi-tag"
    mensajeCarga="Cargando categorías..."
    [loading]="loading()"
    [paginaActual]="paginaActual()"
    [totalPaginas]="totalPaginas()"
    [totalRegistros]="filteredCategorias().length"
    [limitePorPagina]="limitePagina()"
    [mostrarExportar]="false"
    (pageChange)="onPageChange($event)"
    (limitChange)="onLimitChange($event)">

    <div slot="acciones">
      <p-tag
        [value]="filteredCategorias().length + ' categorías'"
        [severity]="viewMode() === 'activas'   ? 'success'
                  : viewMode() === 'inactivas'  ? 'danger' : 'info'">
      </p-tag>
    </div>

    <!-- Estado vacío -->
    <div *ngIf="filteredCategorias().length === 0" class="mensaje-vacio">
      <i class="pi pi-inbox"></i>
      <p>No hay categorías con ese filtro</p>
      <p-button
        label="Limpiar filtros"
        icon="pi pi-filter-slash"
        severity="danger"
        size="small"
        type="button"
        (click)="clearSearch()">
      </p-button>
    </div>

    <!-- Tabla -->
    <p-table
      *ngIf="filteredCategorias().length > 0"
      [value]="categoriasPaginadas()"
      styleClass="p-datatable-striped"
      [paginator]="false"
      [tableStyle]="{ 'min-width': '100%' }">

      <ng-template pTemplate="header">
        <tr>
          <th style="width:60%">NOMBRE</th>
          <th style="width:20%">ESTADO</th>
          <th style="width:20%" class="text-center">ACCIONES</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-cat>
        <tr>
          <td>{{ cat.nombre }}</td>
          <td>
            <p-tag
              [value]="cat.activo ? 'Activo' : 'Inactivo'"
              [severity]="cat.activo ? 'success' : 'danger'">
            </p-tag>
          </td>
          <td class="text-center">
            <div class="acciones-tabla">

              <!-- VER DETALLE — requiere VER_CATEGORIAS -->
              <p-button
                *ngIf="puedeVerDetalle"
                icon="pi pi-eye"
                [rounded]="true" [text]="true" severity="secondary"
                pTooltip="Ver detalle" tooltipPosition="top"
                [routerLink]="['/admin/categoria/detalle-categoria', cat.id_categoria]"
                [disabled]="!cat.id_categoria">
              </p-button>

              <!-- EDITAR — requiere EDITAR_CATEGORIAS -->
              <p-button
                *ngIf="puedeEditarCategoria"
                icon="pi pi-pencil"
                [rounded]="true" [text]="true" severity="secondary"
                pTooltip="Editar categoría" tooltipPosition="top"
                [routerLink]="['/admin/categoria/editar-categoria', cat.id_categoria]">
              </p-button>

              <!-- ACTIVAR / DESACTIVAR — solo ADMIN -->
              <p-button
                *ngIf="esAdmin"
                [icon]="cat.activo ? 'pi pi-times' : 'pi pi-check'"
                [rounded]="true" [text]="true"
                [severity]="cat.activo ? 'danger' : 'success'"
                [pTooltip]="cat.activo ? 'Desactivar' : 'Activar'"
                tooltipPosition="top"
                (onClick)="confirmToggleStatus(cat)">
              </p-button>

            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3" class="text-center">
            <div class="mensaje-vacio">
              <i class="pi pi-inbox"></i>
              <p>No se encontraron categorías</p>
            </div>
          </td>
        </tr>
      </ng-template>

    </p-table>

    <p-confirmdialog />

  </app-shared-table-container>

</div>
