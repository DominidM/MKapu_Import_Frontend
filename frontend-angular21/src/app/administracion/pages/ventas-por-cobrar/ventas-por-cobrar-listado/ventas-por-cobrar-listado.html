<div class="p-2">
  <!-- CABECERA PRINCIPAL -->
  <p-card class="cotizaciones-header-card mb-4 cotizaciones-header-bordered">
    <div class="flex align-items-center justify-content-between flex-wrap">
      <div class="flex align-items-center gap-3">
        <span class="ventas-titulo-icon"><i class="pi pi-credit-card"></i></span>
        <div>
          <p class="ventas-kicker mb-0">{{ tituloKicker }}</p>
          <h2 class="ventas-title mb-0">{{ subtituloKicker }}</h2>
        </div>
      </div>
      <div>
        <p-button label="Crear Venta por Cobrar"
          icon="pi pi-plus"
          styleClass="ventas-pill ventas-pill-crear"
          (onClick)="irAgregarVentaPorCobrar(null)">
        </p-button>
      </div>
    </div>
  </p-card>
</div>

<div class="p-2">
  <!-- FILTROS Y BUSCADOR -->
  <div class="surface-card border-round-xl shadow-1 mb-4 px-3 py-4">
    <div class="flex flex-wrap gap-6 align-items-center">
      <div class="flex-1 p-fluid min-w-18rem">
        <label class="font-medium mb-2 block">Buscar cliente</label>
        <p-autocomplete
          [ngModel]="buscarValue()"
          (ngModelChange)="buscarValue.set($event)"
          [suggestions]="cotizacionSugerencias()"
          (completeMethod)="searchCotizacion($event)"
          (onSelect)="seleccionarCotizacionBusqueda($event)"
          (onClear)="limpiarBusquedaCotizacion()"
          placeholder="Escriba nombre o documento..."
          field="cliente"
          [showClear]="true"
          styleClass="ventas-buscador"
        >
          <ng-template let-item pTemplate="item">
            <div class="ventas-buscador-item p-2">
              <span class="font-bold">{{ item.cliente }}</span>
              <span class="text-secondary">{{ item.fecha }}</span>
            </div>
          </ng-template>
        </p-autocomplete>
      </div>
      <div class="flex flex-column w-14rem">
        <label class="font-medium mb-2 block">Filtrar por Fecha</label>
        <input pInputText type="text" placeholder="mm/dd/yyyy" class="w-full" />
      </div>
      <div class="flex flex-column w-14rem">
        <label class="font-medium mb-2 block">Sede</label>
        <p-select
          [options]="sedesOptions()"
          [ngModel]="sedeSeleccionada()"
          (ngModelChange)="onSedeChange($event)"
          optionLabel="label"
          optionValue="value"
          placeholder="Todas las sedes"
          class="w-full"
          [showClear]="true">
        </p-select>
      </div>
    </div>
  </div>

  <!-- TABLA PRINCIPAL -->
  <div class="surface-card border-round-xl shadow-1">
    <p-table 
      [value]="hardcodedVentasPorCobrar"
      [paginator]="true"
      [rows]="10"
      [totalRecords]="hardcodedVentasPorCobrar.length"
      [rowsPerPageOptions]="[5,10,25,50]"
      styleClass="ventas-table-hover"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width:8%">Fecha</th>
          <th style="width:15%">Cliente</th>
          <th style="width:15%">Sede</th>
          <th style="width:12%">Estado</th>
          <th style="width:15%">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-vp>
        <tr>
          <td>{{ vp.fecha }}</td>
          <td class="font-semibold">{{ vp.cliente }}</td>
          <td>{{ vp.sede }}</td>
          <td>
            <p-tag value="Por Cobrar" styleClass="ventas-tag-por-cobrar"></p-tag>
          </td>
          <td>
            <div class="acciones-grupo">
              <p-button label="Crear Venta"
                icon="pi pi-check"
                styleClass="ventas-btn ventas-btn-crear"
                (onClick)="irAgregarVentaPorCobrar(vp.id)">
              </p-button>
              <p-button label="Cancelar"
                icon="pi pi-times"
                styleClass="ventas-btn ventas-btn-cancelar"
                severity="secondary"
                (onClick)="rechazarCotizacion(vp.id)">
              </p-button>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center py-6">
            <i class="pi pi-inbox text-3xl text-400 mb-3 block"></i>
            <p class="text-900 font-medium mb-0">No hay ventas por cobrar pendientes</p>
          </td>
        </tr>
      </ng-template>
    </p-table>
    <small class="text-600 block text-center py-2">
      El botón "Crear Venta" enviará la venta para procesar el pago.
    </small>
  </div>
</div>

<p-toast></p-toast>
<p-confirmdialog></p-confirmdialog>
