<p-toast></p-toast>

<div class="p-2">
  <p-card class="password-header-card">
    <div class="password-header">
      <div class="password-header-left">
        <span class="password-title-icon">
          <i class="pi pi-key"></i>
        </span>
        <div>
          <p class="password-kicker">ADMINISTRACIÓN · USUARIOS</p>
          <h2 class="password-title">CAMBIAR CREDENCIALES</h2>
        </div>
      </div>

      <div class="password-header-actions">
        <p-button
          label="Volver al listado"
          icon="pi pi-arrow-left"
          styleClass="password-pill password-pill-secondary"
          (onClick)="volver()"
        >
        </p-button>
      </div>
    </div>
  </p-card>
</div>

<ng-container *ngIf="cargando; else contenido">
  <div class="p-2">
    <div class="password-loading">
      <i class="pi pi-spin pi-spinner password-loading-icon"></i>
    </div>
  </div>
</ng-container>

<ng-template #contenido>
  <div class="p-2" *ngIf="error">
    <p-message severity="error" [text]="error" class="block"></p-message>
  </div>

  <ng-container *ngIf="!error">
    <div class="p-2">
      <div class="password-summary-grid">
        <div class="password-summary-card password-summary-card--user">
          <i class="pi pi-user"></i>
          <div>
            <span class="password-summary-label">Usuario</span>
            <span class="password-summary-value">{{ nombreCompleto || 'Sin nombre' }}</span>
            <small class="password-summary-detail">
              <i class="pi pi-id-card"></i>
              ID: {{ usuarioId }}
            </small>
          </div>
        </div>

        <div class="password-summary-card password-summary-card--account">
          <i class="pi pi-at"></i>
          <div>
            <span class="password-summary-label">Cuenta actual</span>
            <span class="password-summary-value">{{ usernameActual || 'Sin cuenta' }}</span>
            <small class="password-summary-detail">
              <i class="pi pi-info-circle"></i>
              Puedes actualizar usuario y contraseña
            </small>
          </div>
        </div>
      </div>
    </div>

    <div class="p-2">
      <div class="password-section-card">
        <div class="password-section-header">
          <h3>
            <i class="pi pi-lock"></i>
            Datos de acceso
          </h3>
        </div>

        <div class="password-fields-grid">
          <div class="password-field password-field-full">
            <label>Nombre de usuario</label>
            <input
              pInputText
              [(ngModel)]="nomUsu"
              placeholder="Ej: jeremy_admin"
              class="w-full"
            />
          </div>

          <div class="password-field">
            <label>Nueva contraseña</label>
            <p-password
              [(ngModel)]="password"
              [toggleMask]="true"
              [feedback]="false"
              placeholder="Ingrese nueva contraseña"
              styleClass="w-full"
              inputStyleClass="w-full"
            >
            </p-password>
          </div>

          <div class="password-field">
            <label>Confirmar contraseña</label>
            <p-password
              [(ngModel)]="confirmPassword"
              [toggleMask]="true"
              [feedback]="false"
              placeholder="Repita la contraseña"
              styleClass="w-full"
              inputStyleClass="w-full"
            >
            </p-password>
          </div>
        </div>

        <p-message
          *ngIf="passwordsNoCoinciden"
          severity="error"
          text="Las contraseñas no coinciden."
          class="mb-3 block"
        >
        </p-message>

        <p-divider></p-divider>

        <div class="password-actions-block">
          <div class="password-actions-row">
            <p-button
              label="Limpiar contraseñas"
              icon="pi pi-eraser"
              styleClass="password-pill password-pill-secondary password-pill-compact"
              (onClick)="limpiarPasswords()"
              [disabled]="guardando"
            >
            </p-button>

            <p-button
              label="Guardar cambios"
              icon="pi pi-save"
              styleClass="password-pill password-pill-warning password-pill-compact"
              (onClick)="guardar()"
              [loading]="guardando"
              [disabled]="guardando || passwordsNoCoinciden"
            >
            </p-button>
          </div>

          <small class="password-actions-note">
            Si dejas la contraseña vacía, solo se actualizará el nombre de usuario.
          </small>
        </div>
      </div>
    </div>
  </ng-container>
</ng-template>
