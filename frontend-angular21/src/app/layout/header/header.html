<p-toast key="global-transfer-notifications" position="top-right"></p-toast>
<div class="app-header-card">
  <p-toolbar styleClass="app-toolbar">
    <ng-template pTemplate="start">
      <p-button
        icon="pi pi-bars"
        class="mr-2 menu-button"
        text
        severity="secondary"
        (onClick)="toggleSidebar.emit()">
      </p-button>

      @if (showCaja) {
        <div class="caja-status-wrapper" [ngClass]="caja() ? 'abierta' : 'cerrada'">
          <span class="caja-status-dot"
            [ngClass]="caja() ? 'caja-abierta' : 'caja-cerrada'">
          </span>
          <span class="caja-status-label">
            {{ caja() ? 'CAJA ABIERTA' : 'CAJA CERRADA' }}
          </span>
        </div>
      }
    </ng-template>

    <ng-template pTemplate="end">
      @if (sedeNombre) {
        <div class="header-sede-badge">
          <i class="pi pi-map-marker"></i>
          <span>{{ sedeNombre }}</span>
        </div>
      }

      <div class="header-bell-wrapper">
        <p-button
          icon="pi pi-bell"
          class="mr-2"
          text
          severity="secondary"
          [routerLink]="['/admin/notificaciones']">
        </p-button>
        @if (notifCount > 0) {
          <span class="header-bell-badge">{{ notifCount }}</span>
        }
      </div>

      <!-- Términos y Condiciones — visible para todos -->
      <p-button
        icon="pi pi-file-edit"
        class="mr-2"
        text
        severity="secondary"
        pTooltip="Términos y Condiciones"
        tooltipPosition="bottom"
        [routerLink]="['/admin/terminos-condiciones']">
      </p-button>

      <!-- Personalización de Empresa — solo admin -->
      @if (isAdmin) {
        <p-button
          icon="pi pi-building"
          class="mr-2"
          text
          severity="secondary"
          pTooltip="Personalización de Empresa"
          tooltipPosition="bottom"
          [routerLink]="['/admin/empresa/configuracion']">
        </p-button>
      }

      <!-- Accesibilidad -->
      <p-button
        class="mr-2"
        text
        severity="secondary"
        pTooltip="Configurar accesibilidad"
        tooltipPosition="bottom"
        (click)="openAccessibilityModal()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="5" r="2"/>
          <path d="M12 8v8"/>
          <path d="M8 12l-4 4"/>
          <path d="M16 12l4 4"/>
          <path d="M8 20h8"/>
        </svg>
      </p-button>

      <!-- Soporte WhatsApp -->
      <p-button
        icon="pi pi-phone"
        class="mr-2"
        text
        severity="secondary"
        pTooltip="Soporte técnico"
        tooltipPosition="bottom"
        (click)="openSupportModal()">
      </p-button>

      <p-button
        [icon]="themeService.isDark() ? 'pi pi-sun' : 'pi pi-moon'"
        text
        severity="secondary"
        (click)="toggleTheme()">
      </p-button>
    </ng-template>
  </p-toolbar>
</div>

<!-- Modales -->
<app-accessibility-modal #accessibilityModal></app-accessibility-modal>
<app-support-modal #supportModal></app-support-modal>
