name: Deploy Frontend

on:
  push:
    branches:
      - produccion

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 194.163.153.99
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo /root/deploy_front.sh